services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ri-certificacion-web
    restart: unless-stopped
    expose:
      - "${PORT:-8020}"
    env_file:
      - .env
    networks:
      - ri-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:${PORT:-8020}/ping')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  ri-network:
    external: true
